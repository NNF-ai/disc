<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.btn-icon:hover{background:rgba(255,255,255,.1);color:#fff}
.btn-icon[disabled]{opacity:.25;cursor:default;pointer-events:none}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:20px}

.opt:active{transform:scale(.99)}
.opt.sel-D{background:rgba(255,71,87,.14);border-color:rgba(255,71,87,.55);color:#fff}
.opt.sel-I{background:rgba(255,165,2,.14);border-color:rgba(255,165,2,.55);color:#fff}
.opt.sel-S{background:rgba(46,213,115,.14);border-color:rgba(46,213,115,.55);color:#fff}
.opt.sel-C{background:rgba(30,144,255,.14);border-color:rgba(30,144,255,.55);color:#fff}
.pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid;white-space:nowrap}
.score-bar{height:100%;border-radius:6px;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.url-input{width:100%;padding:12px 14px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;color:#f0f0f0;font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;transition:border-color .2s}

.link-chip:hover{background:rgba(99,102,241,.25);color:#c7d2fe}
.step-num{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-family:'Black Han Sans',sans-serif;font-size:12px;color:#fff;flex-shrink:0}
#qr-canvas-wrap canvas,#qr-canvas-wrap img{border-radius:6px!important;display:block!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.fu{animation:fadeUp .45s ease both}
.fu1{animation:fadeUp .45s ease .08s both}
.fu2{animation:fadeUp .45s ease .16s both}
.fu3{animation:fadeUp .45s ease .24s both}
.fu4{animation:fadeUp .45s ease .32s both}
.fu5{animation:fadeUp .45s ease .40s both}
.si{animation:scaleIn .5s ease both}
.floating{animation:float 3s ease-in-out infinite}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}

/* ── RADAR SVG ── */
function radarSVG(scores){
  var cx=100,cy=100,R=72;
  function r(k){return Math.max(scores[k]/20,.05)*R;}
  var dv=r("D"),iv=r("I"),sv=r("S"),cv=r("C");
  var pts=cx+","+(cy-dv)+" "+(cx+iv)+","+cy+" "+cx+","+(cy+sv)+" "+(cx-cv)+","+cy;
  function g(f){return cx+","+(cy-R*f)+" "+(cx+R*f)+","+cy+" "+cx+","+(cy+R*f)+" "+(cx-R*f)+","+cy;}
  return '<svg viewBox="0 0 200 200" style="width:100%;max-width:200px;display:block;margin:0 auto">'
    +'<polygon points="'+g(.33)+'" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="1"/>'
    +'<polygon points="'+g(.66)+'" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="1"/>'
    +'<polygon points="'+g(1)+'" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="1"/>'
    +'<line x1="'+cx+'" y1="'+(cy-R)+'" x2="'+cx+'" y2="'+(cy+R)+'" stroke="rgba(255,255,255,.07)" stroke-width="1"/>'
    +'<line x1="'+(cx-R)+'" y1="'+cy+'" x2="'+(cx+R)+'" y2="'+cy+'" stroke="rgba(255,255,255,.07)" stroke-width="1"/>'
    +'<polygon points="'+pts+'" fill="rgba(255,255,255,.09)" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>'
    +'<circle cx="'+cx+'" cy="'+(cy-dv)+'" r="5" fill="#FF4757"/>'
    +'<circle cx="'+(cx+iv)+'" cy="'+cy+'" r="5" fill="#FFA502"/>'
    +'<circle cx="'+cx+'" cy="'+(cy+sv)+'" r="5" fill="#2ED573"/>'
    +'<circle cx="'+(cx-cv)+'" cy="'+cy+'" r="5" fill="#1E90FF"/>'
    +'<text x="'+cx+'" y="'+(cy-R-10)+'" text-anchor="middle" fill="#FF4757" font-size="13" font-weight="bold" font-family="sans-serif">D</text>'
    +'<text x="'+(cx+R+12)+'" y="'+(cy+5)+'" text-anchor="start" fill="#FFA502" font-size="13" font-weight="bold" font-family="sans-serif">I</text>'
    +'<text x="'+cx+'" y="'+(cy+R+17)+'" text-anchor="middle" fill="#2ED573" font-size="13" font-weight="bold" font-family="sans-serif">S</text>'
    +'<text x="'+(cx-R-12)+'" y="'+(cy+5)+'" text-anchor="end" fill="#1E90FF" font-size="13" font-weight="bold" font-family="sans-serif">C</text>'
    +'</svg>';
}

async function copyText(str){
  try{await navigator.clipboard.writeText(str);}
  catch(e){var t=document.createElement("textarea");t.value=str;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);}
}

/* ── SCREENS ── */

function htmlTest(){

  var pct=(ST.q/QS.length)*100;
  var labels=["A","B","C","D"];
  var opts=q.opts.map(function(o,i){
    var isSel=ST.sel===o.t;
    var d=DISC[o.t];
    return '<button class="opt'+(isSel?" sel-"+o.t:"")+'" data-type="'+o.t+'">'
      +'<div style="width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:'+(isSel?d.bg:"rgba(255,255,255,.06)")+';color:'+(isSel?d.color:"rgba(255,255,255,.4)")+';border:1px solid '+(isSel?d.border:"rgba(255,255,255,.08)")+';transition:all .2s">'+labels[i]+'</div>'
      +'<span>'+o.v+'</span>'
      +(isSel?'<span style="margin-left:auto;color:'+d.color+';font-size:18px">✓</span>':"")
      +'</button>';
  }).join("");
  return '<div class="wrap" style="padding-top:24px">'
    +'<div style="margin-bottom:22px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
    +'<button class="btn-icon" id="btn-prev"'+(ST.q===0?" disabled":"")+'>←</button>'
    +'<div style="font-family:\'Black Han Sans\',sans-serif;font-size:20px;color:#fff">'+( ST.q+1)+'<span style="color:rgba(255,255,255,.3);font-size:14px;font-family:\'Noto Sans KR\',sans-serif"> / '+QS.length+'</span></div>'
    +'<div style="width:44px"></div>'

    +'<div style="height:4px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:4px;transition:width .4s ease"></div></div>'
    +'</div>'
    +'<div class="fu" style="flex:1;display:flex;flex-direction:column;gap:14px">'
    +'<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px 20px">'
    +'<div style="font-size:11px;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px">Question '+(ST.q+1)+'</div>'

    +'<div style="display:flex;flex-direction:column;gap:10px">'+opts+'</div>'

    +'<div style="font-family:\'Black Han Sans\',sans-serif;font-size:28px;color:#fff;margin-bottom:8px">'+d.name+'</div>'

    +'<div style="display:flex;gap:16px;align-items:center"><div style="width:42%;flex-shrink:0">'+radarSVG(ST.scores)+'</div>'
    +'<div style="flex:1;display:flex;flex-direction:column;gap:10px">'+bars+'</div></div>'
    +'<div style="font-size:12px;color:rgba(255,255,255,.3);text-align:center;margin-top:14px">주 유형: <span style="color:'+d.color+';font-weight:700">'+d.name+'('+d.letter+')</span> · 보조 유형: <span style="color:'+s2.color+';font-weight:700">'+s2.name+'('+s2.letter+')</span></div>'

function htmlShare(){

  var isLocal=location.hostname==="localhost"||location.hostname==="127.0.0.1"||location.hostname==="";
  var defUrl=(isFile||isLocal)?"":location.href;
  var warn=isFile||isLocal;
  var steps=["이 HTML 파일을 Netlify 또는 GitHub Pages에 업로드","발급받은 URL을 위 입력란에 붙여넣기","QR 코드 생성 → 저장 → 팀원에게 전송 🎉"].map(function(t,i){
    return '<div style="display:flex;gap:12px;align-items:flex-start;'+(i<2?"margin-bottom:10px":"")+'"><div style="width:22px;height:22px;border-radius:50%;background:rgba(99,102,241,.2);border:1px solid rgba(99,102,241,.4);display:flex;align-items:center;justify-content:center;font-size:11px;color:#a5b4fc;flex-shrink:0;margin-top:1px">'+(i+1)+'</div><p style="font-size:13px;color:rgba(255,255,255,.6);line-height:1.65">'+t+'</p></div>';
  }).join("");

    +'<div style="display:flex;align-items:center;gap:14px"><button class="btn-icon" id="btn-back">←</button><div style="font-family:\'Black Han Sans\',sans-serif;font-size:22px;color:#fff">QR코드로 배포하기</div></div>'
    +'<div class="fu card">'
    +'<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:10px;letter-spacing:1px;text-transform:uppercase">🔗 배포된 URL 입력</div>'
    +'<input id="url-input" class="url-input" type="url" placeholder="https://your-app.netlify.app" value="'+defUrl+'">'
    +(warn?'<p style="margin-top:8px;font-size:12px;color:rgba(255,165,2,.85);line-height:1.65">⚠️ 현재 로컬 환경입니다. 아래 배포 가이드를 참고해 웹에 올린 후 URL을 입력하세요.</p>':"")
    +'<button class="btn btn-primary" id="btn-gen" style="margin-top:12px;font-size:15px;padding:14px">QR 코드 생성하기</button>'
    +'</div>'
    +'<div id="qr-result" style="display:none" class="fu1">'
    +'<div style="background:#fff;border-radius:20px;padding:22px;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 0 50px rgba(99,102,241,.2),0 20px 60px rgba(0,0,0,.4)">'
    +'<div id="qr-canvas-wrap" style="line-height:0"></div>'
    +'<div style="font-size:11px;color:#888;font-family:sans-serif">DISC 행동유형 검사</div>'
    +'</div>'
    +'<div style="display:flex;gap:10px;margin-top:12px">'
    +'<button class="btn-ghost" id="btn-copy" style="flex:1">🔗 URL 복사</button>'
    +'<button class="btn-ghost" id="btn-save" style="flex:1">💾 QR 저장</button>'
    +'</div>'
    +'<div id="toast" style="display:none;text-align:center;padding:10px 0;font-size:13px;color:#2ED573">✅ 클립보드에 복사되었습니다!</div>'
    +'</div>'
    +'<div class="fu2">'
    +'<div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:12px;letter-spacing:1px;text-transform:uppercase">📦 무료 배포 가이드</div>'
    +'<div class="card" style="margin-bottom:10px"><div style="display:flex;gap:12px;margin-bottom:12px"><div class="step-num">1</div><div><div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:3px">Netlify Drop <span style="margin-left:4px;font-size:11px;background:rgba(46,213,115,.15);color:#2ED573;border:1px solid rgba(46,213,115,.3);border-radius:6px;padding:2px 8px;font-weight:500">추천</span></div><p style="font-size:13px;color:rgba(255,255,255,.5);line-height:1.65">이 HTML 파일을 드래그 앤 드롭하면 <strong style="color:rgba(255,255,255,.7)">30초</strong> 안에 배포!</p></div></div><a href="https://app.netlify.com/drop" target="_blank" rel="noopener" class="link-chip">🚀 Netlify Drop 열기</a></div>'
    +'<div class="card" style="margin-bottom:10px"><div style="display:flex;gap:12px;margin-bottom:12px"><div class="step-num">2</div><div><div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:3px">GitHub Pages</div><p style="font-size:13px;color:rgba(255,255,255,.5);line-height:1.65"><code style="background:rgba(255,255,255,.08);padding:1px 6px;border-radius:4px;font-size:12px">index.html</code>로 저장 → 레포 업로드 → Pages 활성화</p></div></div><a href="https://github.com/new" target="_blank" rel="noopener" class="link-chip">🐙 GitHub 열기</a></div>'
    +'<div class="card">'+steps+'</div>'
    +'</div>'
    +'<button class="btn-ghost fu3" id="btn-restart2">🔄 다시 검사하기</button>'
    +'</div>';
}

/* ── BIND ── */
var _curUrl="";

function bindWelcome(){
  document.getElementById("btn-start").onclick=function(){go({screen:"test",q:0,answers:[],sel:null});};
}

function bindTest(){
  document.querySelectorAll(".opt").forEach(function(el){
    el.onclick=function(){go({sel:el.dataset.type});};
  });
  var prev=document.getElementById("btn-prev");
  if(prev) prev.onclick=function(){
    if(ST.q===0) return;
    go({q:ST.q-1,answers:ST.answers.slice(0,-1),sel:ST.answers[ST.answers.length-1]||null});
  };
  document.getElementById("btn-next").onclick=function(){
    if(!ST.sel) return;
    var ans=ST.answers.concat([ST.sel]);
    if(ST.q<QS.length-1){
      go({answers:ans,q:ST.q+1,sel:null});
    } else {
      var sc={D:0,I:0,S:0,C:0};
      ans.forEach(function(a){sc[a]++;});
      go({answers:ans,scores:sc,screen:"results",sel:null});
    }
  };
}

function bindResults(){
  document.getElementById("btn-share").onclick=function(){go({screen:"share"});};
  document.getElementById("btn-restart").onclick=function(){go({screen:"welcome",q:0,answers:[],sel:null,scores:{D:0,I:0,S:0,C:0}});};
}

function bindShare(){
  document.getElementById("btn-back").onclick=function(){go({screen:"results"});};
  document.getElementById("btn-restart2").onclick=function(){go({screen:"welcome",q:0,answers:[],sel:null,scores:{D:0,I:0,S:0,C:0}});};

  function genQR(){
    var url=document.getElementById("url-input").value.trim();
    if(!url){alert("URL을 입력해 주세요.");return;}
    if(!url.startsWith("http")){alert("http:// 또는 https://로 시작하는 URL을 입력해 주세요.");return;}
    _curUrl=url;
    var wrap=document.getElementById("qr-canvas-wrap");
    wrap.innerHTML="";
    new QRCode(wrap,{text:url,width:200,height:200,colorDark:"#0a0a14",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M});
    var res=document.getElementById("qr-result");
    res.style.display="block";
    setTimeout(function(){res.scrollIntoView({behavior:"smooth",block:"nearest"});},120);
  }

  document.getElementById("btn-gen").onclick=genQR;

  document.getElementById("btn-copy").onclick=async function(){
    var url=document.getElementById("url-input").value||_curUrl||location.href;
    await copyText(url);
    var t=document.getElementById("toast");
    t.style.display="block";
    setTimeout(function(){t.style.display="none";},2500);
  };

  document.getElementById("btn-save").onclick=function(){
    var canvas=document.querySelector("#qr-canvas-wrap canvas");
    if(!canvas){alert("먼저 QR 코드를 생성해 주세요.");return;}
    var a=document.createElement("a");
    a.href=canvas.toDataURL("image/png");
    a.download="disc-qr.png";
    a.click();
  };

  // Auto-generate on deployed environments
  var urlVal=document.getElementById("url-input").value;
  if(urlVal&&urlVal.startsWith("http")){
    setTimeout(genQR,300);
  }
}

/* ── RENDER ── */
function render(){
  var app=document.getElementById("app");
  var html={welcome:htmlWelcome,test:htmlTest,results:htmlResults,share:htmlShare};
  var bind={welcome:bindWelcome,test:bindTest,results:bindResults,share:bindShare};
  app.innerHTML=html[ST.screen]();
  bind[ST.screen]();
  window.scrollTo(0,0);
}

render();
</script>
